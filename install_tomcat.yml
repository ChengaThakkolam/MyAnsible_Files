---
- name: Install Tomcat on all nodes
  hosts: tomcat_servers
  become: yes

  vars:
    tomcat_version: 9.0.85
    tomcat_url: "https://archive.apache.org/dist/tomcat/tomcat-9/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
    tomcat_install_dir: /opt/tomcat

  tasks:

    - name: Install Java
      apt:
        name: openjdk-11-jdk
        state: present
        update_cache: yes

    - name: Create Tomcat group
      group:
        name: tomcat
        state: present

    - name: Create Tomcat user
      user:
        name: tomcat
        group: tomcat
        home: "{{ tomcat_install_dir }}"
        shell: /bin/false

    - name: Create installation directory
      file:
        path: "{{ tomcat_install_dir }}"
        state: directory
        owner: tomcat
        group: tomcat
        mode: '0755'

    - name: Download Tomcat
      get_url:
        url: "{{ tomcat_url }}"
        dest: /tmp/tomcat.tar.gz

    - name: Extract Tomcat
      unarchive:
        src: /tmp/tomcat.tar.gz
        dest: "{{ tomcat_install_dir }}"
        remote_src: yes
        extra_opts: [--strip-components=1]

    - name: Change ownership
      file:
        path: "{{ tomcat_install_dir }}"
        state: directory
        recurse: yes
        owner: tomcat
        group: tomcat

    - name: Start Tomcat
      shell: "{{ tomcat_install_dir }}/bin/startup.sh"